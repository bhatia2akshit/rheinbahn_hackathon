<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Voice Agent</title>
    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
        rel="stylesheet"
    >
</head>
<body class="bg-light">
<div class="container py-4">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h3 class="mb-0">Pipecat Voice Agent</h3>
        <a href="/" class="btn btn-outline-secondary btn-sm">Back to Dashboard</a>
    </div>

    <div class="card shadow-sm mb-3">
        <div class="card-body">
            <div class="row g-3 mb-3">
                <div class="col-md-6">
                    <label for="driverNameInput" class="form-label">Driver Name</label>
                    <input id="driverNameInput" class="form-control" type="text" placeholder="Akscheid">
                </div>
                <div class="col-md-6">
                    <label for="trainNumberInput" class="form-label">Tram / Bus Number</label>
                    <input id="trainNumberInput" class="form-control" type="text" placeholder="123">
                </div>
            </div>
            <div class="d-flex gap-2 mb-3">
                <button id="connectBtn" class="btn btn-danger">Start Voice</button>
                <button id="disconnectBtn" class="btn btn-outline-secondary" disabled>Stop</button>
            </div>
            <p class="small text-muted mb-2">Starting voice may open standby tabs for police and rettung so the call pages can appear automatically when an event is created.</p>
            <p id="statusText" class="mb-0">Idle</p>
        </div>
    </div>

    <div class="card shadow-sm mb-3">
        <div class="card-header">Conversation</div>
        <div class="card-body">
            <pre id="conversationBox" class="mb-0 small"></pre>
        </div>
    </div>

    <div class="card shadow-sm">
        <div class="card-header">Created Event</div>
        <div class="card-body">
            <div id="eventBox" class="small text-muted">No event created yet.</div>
        </div>
    </div>
</div>

<script src="/static/js/voice_agent.js"></script>
</body>
</html>
