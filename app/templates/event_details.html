<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Incident Details – RheinBahn</title>

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="/static/css/styles.css">
</head>

<body class="bg-light">

<nav class="navbar navbar-expand-lg navbar-dark rheinbahn-red shadow-sm">
    <div class="container-fluid">
        <a class="navbar-brand" href="/">← Back to Dashboard</a>
    </div>
</nav>

<div class="container mt-4">

    <h3 class="fw-bold mb-4">Event Details</h3>

    <div class="card shadow-sm">
        <div class="card-header">
            <h5 class="mb-0">Event #{{ event.event_id }}</h5>
        </div>

        <div class="card-body">
            <div class="table-responsive">
                <table class="table table-sm mb-0">
                    <tbody>
                        <tr>
                            <th scope="row">Event ID</th>
                            <td>{{ event.event_id }}</td>
                        </tr>
                        <tr>
                            <th scope="row">Driver Name</th>
                            <td>{{ event.driver_name }}</td>
                        </tr>
                        <tr>
                            <th scope="row">Train/Bus Number</th>
                            <td>{{ event.train_bus_number }}</td>
                        </tr>
                        <tr>
                            <th scope="row">Status</th>
                            <td>
                                <span class="badge status-badge status-{{ event.status|lower|replace(' ', '-') }}">
                                    {{ event.status }}
                                </span>
                            </td>
                        </tr>
                        <tr>
                            <th scope="row">Timestamp</th>
                            <td>{{ event.timestamp }}</td>
                        </tr>
                        <tr>
                            <th scope="row">Location</th>
                            <td>
                                <a href="{{ event.google_maps_url }}" target="_blank" rel="noopener noreferrer" class="location-link">
                                    {{ event.location }}
                                </a>
                            </td>
                        </tr>
                        <tr>
                            <th scope="row">Description</th>
                            <td>{{ event.description }}</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

</div>

</body>
</html>
